<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TrustCar.io</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Nunito', system-ui, sans-serif; background: #f8fafc; color: #0b1724; }
        .header { background: #0b1724; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; }
        .container { padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e6eefc; }
        th { background: #f1f5f9; }
        .status-pending { color: #f59e0b; font-weight: 600; }
        .btn { padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .btn-review { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TrustCar Admin</div>
        <div>Logged in as Admin</div>
    </div>

    <div class="container">
        <h1>Pending Reports</h1>
        <table id="reportsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>VIN</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function loadReports() {
            const reports = JSON.parse(localStorage.getItem('trustcar_reports') || '[]');
            const tbody = document.querySelector('#reportsTable tbody');
            tbody.innerHTML = '';

            reports.forEach(report => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${report.submitted || 'Just now'}</td>
                    <td>${report.customerName || 'Customer'}</td>
                    <td>${report.vin}</td>
                    <td>${report.type}</td>
                    <td><span class="status-pending">${report.status}</span></td>
                    <td><button class="btn btn-review" onclick="viewReport('${report.id}')">Review</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function viewReport(id) {
            window.location.href = `view.html?id=${id}`;
        }

        // Auto refresh every 8 seconds
        setInterval(loadReports, 8000);
        loadReports();
    </script>
</body>
</html>
