<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0553F0">
    <title>Admin Login — TrustCar.io</title>
    <meta name="description" content="Administrator login for TrustCar dashboard.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">
    <style>
        body { margin:0; padding:0; font-family:'Nunito',system-ui,sans-serif; background:#f5f8fa; color:#0b1724; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .login-card { width:100%; max-width:360px; background:white; padding:2rem; border-radius:12px; box-shadow:0 8px 24px rgba(2,6,23,0.08); }
        h1 { margin-top:0; text-align:center; font-size:1.75rem; }
        .field { margin-bottom:1rem; }
        label { display:block; font-weight:600; margin-bottom:.25rem; }
        input { width:100%; padding:.75rem 1rem; border:2px solid #e6eefc; border-radius:8px; font-size:1rem; }
        input:focus { border-color:#0553F0; outline:none; }
        .btn { width:100%; padding:1rem; border:none; border-radius:8px; font-weight:700; font-size:1rem; cursor:pointer; background:#0553F0; color:white; transition:background .2s; }
        .btn:hover { background:#0441c7; }
        .error { color:#ef4444; font-size:.9rem; text-align:center; margin-top:.5rem; }
    </style>
</head>
<body>
    <div class="login-card" role="main">
        <h1>Admin Login</h1>
        <div class="field">
            <label for="username">Username</label>
            <input id="username" autocomplete="username" />
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" />
        </div>
        <button id="loginBtn" class="btn">Sign In</button>
        <div id="errorMsg" class="error" aria-live="polite"></div>
    </div>
    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';
            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) {
                    window.location.href = '/admin/';
                } else {
                    const data = await res.json().catch(()=>({error:'Login failed'}));
                    errEl.textContent = data.error || 'Invalid credentials';
                }
            } catch(e) {
                errEl.textContent = 'Error communicating with server';
            }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
